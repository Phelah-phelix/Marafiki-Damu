<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Marafiki Damu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .register-card { background: white; border-radius: 30px; padding: 40px; max-width: 500px; width: 100%; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .btn-primary { background: linear-gradient(135deg, #667eea, #764ba2); border: none; padding: 12px; width: 100%; }
    </style>
</head>
<body>
    <div class="register-card">
        <div class="text-center mb-4">
            <i class="bi bi-heart-fill text-danger" style="font-size: 3rem;"></i>
            <h2>Join Marafiki Damu</h2>
        </div>
        <div id="errorMsg" class="alert alert-danger d-none"></div>
        <div id="successMsg" class="alert alert-success d-none"></div>
        
        <ul class="nav nav-tabs mb-3" id="myTab" role="tablist">
            <li class="nav-item"><button class="nav-link active" id="user-tab" data-bs-toggle="tab" data-bs-target="#user">User Registration</button></li>
            <li class="nav-item"><button class="nav-link" id="admin-tab" data-bs-toggle="tab" data-bs-target="#admin">Admin Registration</button></li>
        </ul>
        
        <div class="tab-content">
            <div class="tab-pane fade show active" id="user">
                <form id="userForm">
                    <div class="mb-3"><label>Invite Token *</label><input type="text" id="inviteToken" class="form-control" placeholder="Enter 8-character token" required></div>
                    <div class="mb-3"><label>Username *</label><input type="text" id="username" class="form-control" required></div>
                    <div class="mb-3"><label>Email *</label><input type="email" id="email" class="form-control" required></div>
                    <div class="mb-3"><label>Phone Number</label><input type="tel" id="phone" class="form-control" placeholder="0712345678"></div>
                    <div class="mb-3"><label>Password *</label><input type="password" id="password" class="form-control" required></div>
                    <div class="mb-3"><label>Confirm Password *</label><input type="password" id="confirmPassword" class="form-control" required></div>
                    <button type="submit" class="btn btn-primary">Register as User</button>
                </form>
            </div>
            <div class="tab-pane fade" id="admin">
                <form id="adminForm">
                    <div class="mb-3"><label>Username *</label><input type="text" id="adminUsername" class="form-control" required></div>
                    <div class="mb-3"><label>Email *</label><input type="email" id="adminEmail" class="form-control" required></div>
                    <div class="mb-3"><label>Phone Number</label><input type="tel" id="adminPhone" class="form-control"></div>
                    <div class="mb-3"><label>Password *</label><input type="password" id="adminPassword" class="form-control" required></div>
                    <div class="mb-3"><label>Confirm Password *</label><input type="password" id="adminConfirmPassword" class="form-control" required></div>
                    <button type="submit" class="btn btn-primary">Register as Admin</button>
                </form>
            </div>
        </div>
        <div class="text-center mt-3"><a href="login.html">Already have an account? Login</a></div>
    </div>

    <script>
        const API_URL = 'https://marafiki-backend.onrender.com/api';
        
        document.getElementById('userForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            if (document.getElementById('password').value !== document.getElementById('confirmPassword').value) {
                alert('Passwords do not match'); return;
            }
            const data = {
                username: document.getElementById('username').value,
                password: document.getElementById('password').value,
                email: document.getElementById('email').value,
                phone_number: document.getElementById('phone').value,
                invite_token: document.getElementById('inviteToken').value,
                is_admin: false
            };
            const response = await fetch(`${API_URL}/register/`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            const result = await response.json();
            if (response.ok) {
                document.getElementById('successMsg').innerHTML = result.message;
                document.getElementById('successMsg').classList.remove('d-none');
                setTimeout(() => window.location.href = 'login.html', 3000);
            } else {
                document.getElementById('errorMsg').innerHTML = result.error;
                document.getElementById('errorMsg').classList.remove('d-none');
            }
        });
        
        document.getElementById('adminForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            if (document.getElementById('adminPassword').value !== document.getElementById('adminConfirmPassword').value) {
                alert('Passwords do not match'); return;
            }
            const data = {
                username: document.getElementById('adminUsername').value,
                password: document.getElementById('adminPassword').value,
                email: document.getElementById('adminEmail').value,
                phone_number: document.getElementById('adminPhone').value,
                is_admin: true
            };
            const response = await fetch(`${API_URL}/register/`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            const result = await response.json();
            if (response.ok) {
                alert('Admin created! You can now login and create groups.');
                window.location.href = 'login.html';
            } else {
                alert(result.error);
            }
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
