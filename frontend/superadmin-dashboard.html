<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Admin | Marafiki Damu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: #f5f5f0; }
        
        .top-nav { background: #1a1a2e; padding: 0 24px; height: 64px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
        .logo { display: flex; align-items: center; gap: 8px; font-weight: 600; font-size: 18px; color: white; }
        .logo i { color: #e74c3c; }
        .user-info { color: rgba(255,255,255,0.8); font-size: 14px; }
        .avatar { width: 36px; height: 36px; background: #667eea; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; margin-left: 12px; }
        
        .sidebar { position: fixed; top: 64px; left: 0; width: 240px; height: calc(100vh - 64px); background: white; border-right: 1px solid #e0e0e0; padding: 24px 16px; }
        .nav-item { display: flex; align-items: center; gap: 12px; padding: 10px 16px; margin-bottom: 4px; border-radius: 8px; color: #555; text-decoration: none; font-size: 14px; font-weight: 500; cursor: pointer; }
        .nav-item:hover { background: #f0f0f0; }
        .nav-item.active { background: #1a1a2e; color: white; }
        .nav-item i { width: 20px; }
        
        .main-content { margin-left: 240px; padding: 32px; margin-top: 64px; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 32px; }
        .stat-card { background: white; border-radius: 12px; padding: 20px; border: 1px solid #e0e0e0; }
        .stat-card .label { font-size: 13px; color: #888; margin-bottom: 8px; }
        .stat-card .value { font-size: 32px; font-weight: 700; color: #1a1a1a; }
        
        .card { background: white; border-radius: 12px; border: 1px solid #e0e0e0; overflow: hidden; margin-bottom: 24px; }
        .card-header { padding: 16px 20px; border-bottom: 1px solid #e0e0e0; font-weight: 600; display: flex; justify-content: space-between; align-items: center; }
        .card-body { padding: 20px; }
        
        .group-item, .request-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #e0e0e0; }
        .group-name { font-weight: 500; }
        .group-code { font-family: monospace; background: #f0f0f0; padding: 2px 8px; border-radius: 4px; font-size: 12px; }
        .badge-active { background: #27ae60; color: white; padding: 2px 8px; border-radius: 4px; font-size: 11px; }
        .badge-pending { background: #f39c12; color: white; padding: 2px 8px; border-radius: 4px; font-size: 11px; }
        
        .btn-approve { background: #27ae60; color: white; border: none; padding: 4px 12px; border-radius: 6px; font-size: 12px; margin-right: 8px; cursor: pointer; }
        .btn-reject { background: #e74c3c; color: white; border: none; padding: 4px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; }
        .btn-create { background: #1a1a2e; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; }
        
        input, textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 16px; }
        label { font-size: 13px; font-weight: 500; margin-bottom: 6px; display: block; }
        
        @media (max-width: 768px) { .sidebar { display: none; } .main-content { margin-left: 0; } .stats-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="top-nav"><div class="logo"><i class="bi bi-heart-fill"></i> <span>Marafiki Damu</span></div><div class="user-info">Super Admin <span class="avatar">SA</span></div></div>
    <div class="sidebar"><a class="nav-item active" onclick="showSection('dashboard')"><i class="bi bi-speedometer2"></i> Dashboard</a><a class="nav-item" onclick="showSection('groups')"><i class="bi bi-people"></i> Groups</a><a class="nav-item" onclick="showSection('requests')"><i class="bi bi-envelope"></i> Requests</a><a class="nav-item" onclick="showSection('create')"><i class="bi bi-plus"></i> Create Group</a><div style="margin-top: auto; padding-top: 40px;"><a class="nav-item" onclick="logout()"><i class="bi bi-box-arrow-right"></i> Logout</a></div></div>
    
    <div class="main-content">
        <div id="dashboardSection">
            <div style="margin-bottom: 24px;"><h1 style="font-size: 24px; font-weight: 600;">Dashboard</h1><p style="color: #666;">Welcome back, Super Admin</p></div>
            <div class="stats-grid" id="statsGrid"></div>
            <div class="card"><div class="card-header">Groups Overview</div><div class="card-body"><canvas id="groupsChart" height="300"></canvas></div></div>
        </div>
        <div id="groupsSection" style="display: none;"><div class="card"><div class="card-header">All Groups</div><div class="card-body" id="groupsList"></div></div></div>
        <div id="requestsSection" style="display: none;"><div class="card"><div class="card-header">Pending Admin Requests</div><div class="card-body" id="requestsList"></div></div></div>
        <div id="createSection" style="display: none;"><div class="card"><div class="card-header">Create New Group</div><div class="card-body"><form id="createGroupForm"><label>Group Name</label><input type="text" id="groupName" required><label>Description</label><textarea id="groupDesc" rows="3"></textarea><label>Weekly Goal (KES)</label><input type="number" id="weeklyGoal" value="100"><label>Daily Contribution (KES)</label><input type="number" id="dailyContribution" value="10"><button type="submit" class="btn-create">Create Group</button></form></div></div></div>
    </div>

    <script>
        const API_URL = 'https://marafiki-backend.onrender.com/api';
        let groupsChart = null;
        function getToken() { return localStorage.getItem('access_token'); }
        
        async function loadDashboard() {
            const token = getToken();
            if (!token) { window.location.href = 'login.html'; return; }
            try {
                const res = await fetch(`${API_URL}/superadmin/groups/`, { headers: { 'Authorization': `Bearer ${token}` } });
                const groups = await res.json();
                const totalGroups = groups.length;
                const totalMembers = groups.reduce((s,g) => s + g.member_count, 0);
                document.getElementById('statsGrid').innerHTML = `<div class="stat-card"><div class="label">Total Groups</div><div class="value">${totalGroups}</div></div><div class="stat-card"><div class="label">Total Members</div><div class="value">${totalMembers}</div></div><div class="stat-card"><div class="label">Pending Requests</div><div class="value" id="pendingCount">0</div></div>`;
                if (groupsChart) groupsChart.destroy();
                const ctx = document.getElementById('groupsChart').getContext('2d');
                groupsChart = new Chart(ctx, { type: 'bar', data: { labels: groups.map(g => g.name.length > 20 ? g.name.slice(0,20)+'...' : g.name), datasets: [{ label: 'Members', data: groups.map(g => g.member_count), backgroundColor: '#1a1a2e', borderRadius: 6 }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } } });
                document.getElementById('groupsList').innerHTML = groups.map(g => `<div class="group-item"><div><div class="group-name">${g.name}</div><div class="group-code">${g.code}</div><div style="font-size: 12px; color: #888; margin-top: 4px;">👑 ${g.admin_name || 'No admin'}</div></div><div><span class="badge-active">${g.member_count} members</span><div style="font-size: 11px; margin-top: 4px; text-align: right;">${g.is_active ? 'Active' : 'Inactive'}</div></div></div>`).join('');
                await loadRequests();
            } catch (error) { console.error(error); }
        }
        
        async function loadRequests() {
            const token = getToken();
            const res = await fetch(`${API_URL}/superadmin/pending-requests/`, { headers: { 'Authorization': `Bearer ${token}` } });
            const requests = await res.json();
            document.getElementById('pendingCount').innerText = requests.length;
            document.getElementById('requestsList').innerHTML = requests.map(r => `<div class="request-item"><div><strong>${r.requester}</strong><br><span style="font-size: 12px; color: #888;">${r.requester_email}</span><br><span class="badge-pending" style="margin-top: 4px; display: inline-block;">${r.request_type}</span></div><div><button class="btn-approve" onclick="approveRequest(${r.id})">Approve</button><button class="btn-reject" onclick="rejectRequest(${r.id})">Reject</button></div></div>`).join('');
        }
        
        async function approveRequest(id) { const token = getToken(); await fetch(`${API_URL}/superadmin/approve-request/${id}/`, { method: 'POST', headers: { 'Authorization': `Bearer ${token}` } }); alert('Approved'); loadDashboard(); }
        async function rejectRequest(id) { const token = getToken(); await fetch(`${API_URL}/superadmin/reject-request/${id}/`, { method: 'POST', headers: { 'Authorization': `Bearer ${token}` } }); alert('Rejected'); loadDashboard(); }
        
        document.getElementById('createGroupForm')?.addEventListener('submit', async (e) => {
            e.preventDefault();
            const token = getToken();
            const res = await fetch(`${API_URL}/superadmin/create-group/`, { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, body: JSON.stringify({ group_name: document.getElementById('groupName').value, description: document.getElementById('groupDesc').value, weekly_goal: document.getElementById('weeklyGoal').value, daily_contribution: document.getElementById('dailyContribution').value }) });
            const data = await res.json();
            alert(`${data.message}\nGroup Code: ${data.group_code}`);
            document.getElementById('createGroupForm').reset();
            showSection('groups');
            loadDashboard();
        });
        
        function showSection(section) {
            document.getElementById('dashboardSection').style.display = 'none';
            document.getElementById('groupsSection').style.display = 'none';
            document.getElementById('requestsSection').style.display = 'none';
            document.getElementById('createSection').style.display = 'none';
            document.getElementById(`${section}Section`).style.display = 'block';
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            event.target.classList.add('active');
        }
        
        function logout() { localStorage.removeItem('access_token'); window.location.href = 'login.html'; }
        loadDashboard(); setInterval(loadDashboard, 30000);
    </script>
</body>
</html>
