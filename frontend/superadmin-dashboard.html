<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Admin | Marafiki Damu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e9ecef 100%);
            min-height: 100vh;
        }
        
        /* Modern Navbar */
        .navbar-modern {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            padding: 0 32px;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .logo-icon i { color: white; font-size: 20px; }
        .logo-text { font-weight: 700; font-size: 20px; color: white; letter-spacing: -0.5px; }
        .logo-text span { color: #e74c3c; }
        .user-info { display: flex; align-items: center; gap: 20px; }
        .avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
        }
        
        /* Sidebar */
        .sidebar {
            position: fixed;
            top: 70px;
            left: 0;
            width: 280px;
            height: calc(100vh - 70px);
            background: white;
            box-shadow: 2px 0 20px rgba(0,0,0,0.05);
            padding: 24px 16px;
        }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            margin-bottom: 8px;
            border-radius: 12px;
            color: #5a6e8a;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s;
            cursor: pointer;
        }
        .nav-item i { width: 24px; font-size: 18px; }
        .nav-item:hover { background: #f8f9fa; color: #4361ee; transform: translateX(5px); }
        .nav-item.active { background: linear-gradient(135deg, #4361ee, #3a0ca3); color: white; box-shadow: 0 4px 12px rgba(67,97,238,0.3); }
        
        /* Main Content */
        .main-content { margin-left: 280px; padding: 32px; margin-top: 70px; }
        
        /* Welcome Header */
        .welcome-header {
            margin-bottom: 32px;
        }
        .welcome-header h1 {
            font-size: 28px;
            font-weight: 700;
            color: #1a2c3e;
            margin-bottom: 8px;
        }
        .welcome-header p { color: #8a99b4; font-size: 14px; }
        
        /* Stat Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 24px;
            margin-bottom: 32px;
        }
        .stat-card {
            background: white;
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            transition: all 0.3s;
            border: 1px solid rgba(0,0,0,0.05);
        }
        .stat-card:hover { transform: translateY(-4px); box-shadow: 0 12px 24px rgba(0,0,0,0.08); }
        .stat-icon {
            width: 48px;
            height: 48px;
            background: rgba(67,97,238,0.1);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
        }
        .stat-icon i { font-size: 24px; color: #4361ee; }
        .stat-value { font-size: 32px; font-weight: 800; color: #1a2c3e; }
        .stat-label { font-size: 13px; color: #8a99b4; margin-top: 4px; }
        
        /* Request Cards */
        .request-card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            border-left: 4px solid #f39c12;
            transition: all 0.3s;
        }
        .request-card:hover { transform: translateX(5px); box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        .btn-approve {
            background: linear-gradient(135deg, #00b09b, #96c93d);
            color: white;
            border: none;
            padding: 8px 24px;
            border-radius: 10px;
            font-weight: 600;
            margin-right: 12px;
            transition: all 0.3s;
        }
        .btn-reject {
            background: linear-gradient(135deg, #ff6b6b, #ee5a24);
            color: white;
            border: none;
            padding: 8px 24px;
            border-radius: 10px;
            font-weight: 600;
            transition: all 0.3s;
        }
        .btn-approve:hover, .btn-reject:hover { transform: translateY(-2px); }
        .badge-pending {
            background: #f39c12;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        
        @media (max-width: 1024px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .sidebar { width: 80px; }
            .sidebar span { display: none; }
            .main-content { margin-left: 80px; }
            .nav-item { justify-content: center; }
            .nav-item i { margin-right: 0; }
        }
    </style>
</head>
<body>
    <div class="navbar-modern">
        <div class="logo">
            <div class="logo-icon"><i class="bi bi-shield-lock"></i></div>
            <div class="logo-text">Marafiki <span>Damu</span></div>
        </div>
        <div class="user-info">
            <span style="color: rgba(255,255,255,0.8);">Super Admin</span>
            <div class="avatar">SA</div>
        </div>
    </div>
    
    <div class="sidebar">
        <div class="nav-item active" onclick="showSection('dashboard')">
            <i class="bi bi-speedometer2"></i> <span>Dashboard</span>
        </div>
        <div class="nav-item" onclick="showSection('requests')">
            <i class="bi bi-envelope-paper"></i> <span>Group Requests</span>
            <span id="requestBadge" style="background: #e74c3c; color: white; border-radius: 50%; padding: 2px 6px; font-size: 10px; margin-left: auto; display: none;">0</span>
        </div>
        <div class="nav-item" onclick="showSection('groups')">
            <i class="bi bi-people"></i> <span>All Groups</span>
        </div>
        <hr style="margin: 16px 0;">
        <div class="nav-item" onclick="logout()">
            <i class="bi bi-box-arrow-right"></i> <span>Logout</span>
        </div>
    </div>
    
    <div class="main-content">
        <div id="dashboardSection">
            <div class="welcome-header">
                <h1>Welcome back, Super Admin! 👑</h1>
                <p>Manage groups and approve requests from admins</p>
            </div>
            <div class="stats-grid" id="statsGrid"></div>
        </div>
        
        <div id="requestsSection" style="display: none;">
            <div class="welcome-header">
                <h1><i class="bi bi-envelope-paper"></i> Group Creation Requests</h1>
                <p>Review and approve group requests from admins</p>
            </div>
            <div id="requestsList"></div>
        </div>
        
        <div id="groupsSection" style="display: none;">
            <div class="welcome-header">
                <h1><i class="bi bi-people"></i> All Groups</h1>
                <p>Manage all chama groups in the system</p>
            </div>
            <div id="groupsList"></div>
        </div>
    </div>

    <script>
        const API_URL = 'https://marafiki-backend.onrender.com/api';
        
        function getToken() { return localStorage.getItem('access_token'); }
        
        async function loadStats() {
            try {
                const token = getToken();
                const response = await fetch(`${API_URL}/superadmin/groups/`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const groups = await response.json();
                const pendingRes = await fetch(`${API_URL}/superadmin/pending-requests/`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const pending = await pendingRes.json();
                
                document.getElementById('statsGrid').innerHTML = `
                    <div class="stat-card"><div class="stat-icon"><i class="bi bi-building"></i></div><div class="stat-value">${groups.length}</div><div class="stat-label">Total Groups</div></div>
                    <div class="stat-card"><div class="stat-icon"><i class="bi bi-people"></i></div><div class="stat-value">${groups.reduce((s,g) => s + (g.member_count || 0), 0)}</div><div class="stat-label">Total Members</div></div>
                    <div class="stat-card"><div class="stat-icon"><i class="bi bi-clock-history"></i></div><div class="stat-value">${pending.length}</div><div class="stat-label">Pending Requests</div></div>
                    <div class="stat-card"><div class="stat-icon"><i class="bi bi-coin"></i></div><div class="stat-value">KES 0</div><div class="stat-label">Total Raised</div></div>
                `;
            } catch(e) { console.error(e); }
        }
        
        async function loadRequests() {
            const token = getToken();
            try {
                const response = await fetch(`${API_URL}/superadmin/pending-requests/`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const requests = await response.json();
                
                const badge = document.getElementById('requestBadge');
                if (requests.length > 0) {
                    badge.style.display = 'inline-block';
                    badge.innerText = requests.length;
                } else {
                    badge.style.display = 'none';
                }
                
                if (requests.length === 0) {
                    document.getElementById('requestsList').innerHTML = `
                        <div style="background: white; border-radius: 20px; padding: 60px; text-align: center;">
                            <i class="bi bi-check-circle" style="font-size: 64px; color: #28a745;"></i>
                            <h3 class="mt-3">No Pending Requests</h3>
                            <p class="text-muted">All group requests have been processed</p>
                        </div>
                    `;
                } else {
                    document.getElementById('requestsList').innerHTML = requests.map(r => `
                        <div class="request-card">
                            <div class="d-flex justify-content-between align-items-start mb-3">
                                <div>
                                    <h4 class="mb-1">${r.group_name}</h4>
                                    <p class="text-muted mb-0">
                                        <i class="bi bi-person"></i> ${r.requester} (${r.requester_email})
                                    </p>
                                </div>
                                <div><span class="badge-pending">PENDING</span></div>
                            </div>
                            <div class="row mb-3">
                                <div class="col-md-3"><small class="text-muted">Weekly Goal</small><br><strong>KES ${r.weekly_goal}</strong></div>
                                <div class="col-md-3"><small class="text-muted">Daily Contribution</small><br><strong>KES ${r.daily_contribution}</strong></div>
                                <div class="col-md-3"><small class="text-muted">Requested</small><br><strong>${r.created_at}</strong></div>
                            </div>
                            ${r.admin_notes ? `<div class="alert alert-light"><i class="bi bi-chat"></i> <strong>Admin Notes:</strong> ${r.admin_notes}</div>` : ''}
                            <textarea id="notes-${r.id}" class="form-control mb-3" rows="2" placeholder="Add response notes for the admin..."></textarea>
                            <div>
                                <button class="btn-approve" onclick="approveRequest(${r.id})"><i class="bi bi-check-lg"></i> Approve Group</button>
                                <button class="btn-reject" onclick="rejectRequest(${r.id})"><i class="bi bi-x-lg"></i> Reject Request</button>
                            </div>
                        </div>
                    `).join('');
                }
            } catch(e) { console.error(e); }
        }
        
        async function loadGroups() {
            const token = getToken();
            try {
                const response = await fetch(`${API_URL}/superadmin/groups/`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const groups = await response.json();
                document.getElementById('groupsList').innerHTML = groups.map(g => `
                    <div style="background: white; border-radius: 16px; padding: 20px; margin-bottom: 15px;">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <h5 class="mb-1">${g.name}</h5>
                                <p class="text-muted mb-0"><code>${g.code}</code></p>
                            </div>
                            <div><span class="badge bg-primary">${g.member_count || 0} Members</span></div>
                        </div>
                    </div>
                `).join('');
            } catch(e) { console.error(e); }
        }
        
        async function approveRequest(id) {
            const token = getToken();
            const notes = document.getElementById(`notes-${id}`)?.value || '';
            const response = await fetch(`${API_URL}/superadmin/approve-request/${id}/`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({ notes })
            });
            const data = await response.json();
            alert(data.message);
            loadRequests();
            loadStats();
        }
        
        async function rejectRequest(id) {
            const token = getToken();
            const notes = document.getElementById(`notes-${id}`)?.value || '';
            const response = await fetch(`${API_URL}/superadmin/reject-request/${id}/`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({ notes })
            });
            const data = await response.json();
            alert(data.message);
            loadRequests();
        }
        
        function showSection(section) {
            document.getElementById('dashboardSection').style.display = 'none';
            document.getElementById('requestsSection').style.display = 'none';
            document.getElementById('groupsSection').style.display = 'none';
            document.getElementById(`${section}Section`).style.display = 'block';
            
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            event.target.closest('.nav-item').classList.add('active');
            
            if (section === 'requests') loadRequests();
            if (section === 'groups') loadGroups();
        }
        
        function logout() { localStorage.removeItem('access_token'); localStorage.removeItem('user'); window.location.href = 'login.html'; }
        
        if (!getToken()) { window.location.href = 'login.html'; }
        loadStats();
    </script>
</body>
</html>
