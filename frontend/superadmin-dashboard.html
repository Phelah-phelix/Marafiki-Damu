<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: #f0f2f5; }
        .navbar { background: #1a1a2e; color: white; padding: 15px 20px; }
        .sidebar { position: fixed; left: 0; top: 60px; width: 250px; background: white; height: 100%; padding: 20px; }
        .sidebar a { display: block; padding: 12px; color: #333; text-decoration: none; margin-bottom: 5px; border-radius: 8px; cursor: pointer; }
        .sidebar a:hover { background: #e0e0e0; }
        .sidebar a.active { background: #1a1a2e; color: white; }
        .content { margin-left: 270px; padding: 20px; }
        .card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
        .request-card { border: 1px solid #ddd; border-radius: 10px; padding: 20px; margin-bottom: 20px; border-left: 4px solid #ffc107; }
        .btn-approve { background: #28a745; color: white; border: none; padding: 8px 20px; border-radius: 6px; margin-right: 10px; }
        .btn-reject { background: #dc3545; color: white; border: none; padding: 8px 20px; border-radius: 6px; }
        .badge-pending { background: #ffc107; color: #000; padding: 4px 12px; border-radius: 20px; font-size: 12px; }
    </style>
</head>
<body>
    <div class="navbar">
        <div><i class="bi bi-heart-fill text-danger"></i> Marafiki Damu - Super Admin</div>
        <div><span id="adminName">Loading...</span> | <a href="#" onclick="logout()" style="color: white;">Logout</a></div>
    </div>
    
    <div class="sidebar">
        <a href="#" class="active" onclick="showSection('dashboard')">📊 Dashboard</a>
        <a href="#" onclick="showSection('requests')">📋 Group Requests</a>
        <a href="#" onclick="showSection('groups')">👥 All Groups</a>
        <hr>
        <a href="#" onclick="logout()">🚪 Logout</a>
    </div>
    
    <div class="content">
        <div id="dashboardSection">
            <h2>Super Admin Dashboard</h2>
            <div id="stats"></div>
        </div>
        
        <div id="requestsSection" style="display: none;">
            <h2>Pending Group Requests</h2>
            <div id="requestsList">Loading...</div>
        </div>
        
        <div id="groupsSection" style="display: none;">
            <h2>All Groups</h2>
            <div id="groupsList"></div>
        </div>
    </div>

    <script>
        const API_URL = 'https://marafiki-backend.onrender.com/api';
        
        function getToken() { return localStorage.getItem('access_token'); }
        
        // Check if user is logged in
        async function checkAuth() {
            const token = getToken();
            if (!token) {
                window.location.href = 'login.html';
                return false;
            }
            
            // Try to get user info
            const userStr = localStorage.getItem('user');
            if (userStr) {
                try {
                    const user = JSON.parse(userStr);
                    document.getElementById('adminName').innerHTML = user.username || 'Admin';
                    if (user.role !== 'superadmin') {
                        window.location.href = 'dashboard.html';
                        return false;
                    }
                } catch(e) {}
            }
            return true;
        }
        
        async function loadRequests() {
            const token = getToken();
            if (!token) return;
            
            try {
                const response = await fetch(`${API_URL}/superadmin/pending-requests/`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (response.status === 401) {
                    localStorage.removeItem('access_token');
                    window.location.href = 'login.html';
                    return;
                }
                
                const requests = await response.json();
                
                if (requests.length === 0) {
                    document.getElementById('requestsList').innerHTML = '<div class="card text-center">No pending requests 🎉</div>';
                } else {
                    document.getElementById('requestsList').innerHTML = requests.map(r => `
                        <div class="request-card">
                            <h5>${r.group_name}</h5>
                            <p>Requested by: ${r.requester} (${r.requester_email})</p>
                            <p>Weekly Goal: KES ${r.weekly_goal} | Daily: KES ${r.daily_contribution}</p>
                            ${r.admin_notes ? `<p><strong>Admin Notes:</strong> ${r.admin_notes}</p>` : ''}
                            <p><small>Requested: ${r.created_at}</small></p>
                            <textarea id="notes-${r.id}" class="form-control" rows="2" placeholder="Response notes..."></textarea>
                            <div class="mt-2">
                                <button class="btn-approve" onclick="approveRequest(${r.id})">Approve</button>
                                <button class="btn-reject" onclick="rejectRequest(${r.id})">Reject</button>
                            </div>
                        </div>
                    `).join('');
                }
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('requestsList').innerHTML = '<div class="card text-danger">Error loading requests</div>';
            }
        }
        
        async function approveRequest(id) {
            const token = getToken();
            const notes = document.getElementById(`notes-${id}`)?.value || '';
            
            const response = await fetch(`${API_URL}/superadmin/approve-request/${id}/`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({ notes: notes })
            });
            const data = await response.json();
            alert(data.message);
            loadRequests();
        }
        
        async function rejectRequest(id) {
            const token = getToken();
            const notes = document.getElementById(`notes-${id}`)?.value || '';
            
            const response = await fetch(`${API_URL}/superadmin/reject-request/${id}/`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({ notes: notes })
            });
            const data = await response.json();
            alert(data.message);
            loadRequests();
        }
        
        async function loadDashboard() {
            const token = getToken();
            try {
                const response = await fetch(`${API_URL}/superadmin/groups/`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const groups = await response.json();
                document.getElementById('stats').innerHTML = `
                    <div class="row">
                        <div class="col-md-4"><div class="card"><h3>${groups.length}</h3><p>Total Groups</p></div></div>
                        <div class="col-md-4"><div class="card"><h3>${groups.reduce((s,g) => s + (g.member_count || 0), 0)}</h3><p>Total Members</p></div></div>
                    </div>
                `;
                document.getElementById('groupsList').innerHTML = groups.map(g => `
                    <div class="card"><strong>${g.name}</strong> (${g.code})<br>Members: ${g.member_count}</div>
                `).join('');
            } catch (error) {
                console.error(error);
            }
        }
        
        function showSection(section) {
            document.getElementById('dashboardSection').style.display = 'none';
            document.getElementById('requestsSection').style.display = 'none';
            document.getElementById('groupsSection').style.display = 'none';
            document.getElementById(`${section}Section`).style.display = 'block';
            if (section === 'requests') loadRequests();
        }
        
        function logout() {
            localStorage.removeItem('access_token');
            localStorage.removeItem('user');
            window.location.href = 'login.html';
        }
        
        checkAuth().then(() => {
            loadDashboard();
        });
    </script>
</body>
</html>
