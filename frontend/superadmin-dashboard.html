<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Admin | Marafiki Damu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: #f0f2f5; font-family: 'Segoe UI', sans-serif; }
        .navbar { background: #0f0f1a; color: white; padding: 15px 20px; }
        .sidebar { position: fixed; left: 0; top: 60px; width: 250px; background: white; height: 100%; padding: 20px; }
        .sidebar a { display: block; padding: 12px; color: #333; text-decoration: none; margin-bottom: 5px; border-radius: 8px; cursor: pointer; }
        .sidebar a:hover { background: #e0e0e0; }
        .sidebar a.active { background: #0f0f1a; color: white; }
        .content { margin-left: 270px; padding: 20px; }
        .card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
        .request-card { border: 1px solid #ddd; border-radius: 10px; padding: 20px; margin-bottom: 20px; border-left: 4px solid #ffc107; }
        .btn-approve { background: #28a745; color: white; border: none; padding: 8px 20px; border-radius: 6px; margin-right: 10px; }
        .btn-reject { background: #dc3545; color: white; border: none; padding: 8px 20px; border-radius: 6px; }
        .badge-pending { background: #ffc107; color: #000; padding: 4px 12px; border-radius: 20px; font-size: 12px; }
        .notification-badge { background: #dc3545; color: white; border-radius: 50%; padding: 2px 6px; font-size: 12px; margin-left: 10px; }
        textarea { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 6px; margin: 10px 0; }
    </style>
</head>
<body>
    <div class="navbar">
        <div><i class="bi bi-heart-fill text-danger"></i> Marafiki Damu - Super Admin</div>
        <div><span id="adminName">Loading...</span> | <a href="#" onclick="logout()" style="color: white;">Logout</a></div>
    </div>
    
    <div class="sidebar">
        <a href="#" class="active" onclick="showSection('dashboard')"><i class="bi bi-speedometer2"></i> Dashboard</a>
        <a href="#" onclick="showSection('requests')"><i class="bi bi-envelope-paper"></i> Group Requests <span id="requestBadge" class="notification-badge" style="display: none;">0</span></a>
        <a href="#" onclick="showSection('groups')"><i class="bi bi-people"></i> All Groups</a>
        <hr>
        <a href="#" onclick="logout()"><i class="bi bi-box-arrow-right"></i> Logout</a>
    </div>
    
    <div class="content">
        <div id="dashboardSection">
            <h2>Super Admin Dashboard</h2>
            <div id="stats"></div>
        </div>
        
        <div id="requestsSection" style="display: none;">
            <h2>Pending Group Requests</h2>
            <div id="requestsList">Loading...</div>
        </div>
        
        <div id="groupsSection" style="display: none;">
            <h2>All Groups</h2>
            <div id="groupsList"></div>
        </div>
    </div>

    <script>
        const API_URL = 'https://marafiki-backend.onrender.com/api';
        
        function getToken() { return localStorage.getItem('access_token'); }
        
        // Check if user is super admin
        async function checkAuth() {
            const token = getToken();
            if (!token) {
                window.location.href = 'login.html';
                return false;
            }
            
            try {
                const user = JSON.parse(localStorage.getItem('user') || '{}');
                if (user.role !== 'superadmin') {
                    window.location.href = 'login.html';
                    return false;
                }
                document.getElementById('adminName').innerText = user.username || 'phelix';
                return true;
            } catch (e) {
                window.location.href = 'login.html';
                return false;
            }
        }
        
        async function loadRequests() {
            const token = getToken();
            if (!token) return;
            
            try {
                const response = await fetch(`${API_URL}/superadmin/pending-requests/`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (response.status === 403) {
                    document.getElementById('requestsList').innerHTML = '<div class="card text-danger">You are not authorized as Super Admin.</div>';
                    return;
                }
                
                const requests = await response.json();
                
                const badge = document.getElementById('requestBadge');
                if (requests.length > 0) {
                    badge.style.display = 'inline-block';
                    badge.innerText = requests.length;
                } else {
                    badge.style.display = 'none';
                }
                
                if (requests.length === 0) {
                    document.getElementById('requestsList').innerHTML = '<div class="card text-center">No pending requests 🎉</div>';
                } else {
                    document.getElementById('requestsList').innerHTML = requests.map(r => `
                        <div class="request-card">
                            <div class="d-flex justify-content-between">
                                <div>
                                    <h5>${r.group_name}</h5>
                                    <p class="text-muted">Requested by: ${r.requester} (${r.requester_email})</p>
                                </div>
                                <div><span class="badge-pending">PENDING</span></div>
                            </div>
                            <div class="row">
                                <div class="col-md-3"><small>Weekly Goal:</small><br><strong>KES ${r.weekly_goal}</strong></div>
                                <div class="col-md-3"><small>Daily Contribution:</small><br><strong>KES ${r.daily_contribution}</strong></div>
                                <div class="col-md-3"><small>Max Members:</small><br><strong>${r.max_members}</strong></div>
                                <div class="col-md-3"><small>Requested:</small><br><strong>${r.created_at}</strong></div>
                            </div>
                            ${r.admin_notes ? `<div class="mt-2 alert alert-light"><strong>Admin Notes:</strong> ${r.admin_notes}</div>` : ''}
                            <div class="mt-3">
                                <textarea id="notes-${r.id}" class="form-control" rows="2" placeholder="Response notes for admin..."></textarea>
                                <div class="mt-2">
                                    <button class="btn-approve" onclick="approveRequest(${r.id})">✅ Approve Group</button>
                                    <button class="btn-reject" onclick="rejectRequest(${r.id})">❌ Reject Request</button>
                                </div>
                            </div>
                        </div>
                    `).join('');
                }
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('requestsList').innerHTML = '<div class="card text-danger">Error loading requests. Please try again.</div>';
            }
        }
        
        async function approveRequest(id) {
            const token = getToken();
            const notes = document.getElementById(`notes-${id}`)?.value || '';
            
            try {
                const response = await fetch(`${API_URL}/superadmin/approve-request/${id}/`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ notes: notes })
                });
                const data = await response.json();
                alert(data.message);
                loadRequests();
                loadDashboard();
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }
        
        async function rejectRequest(id) {
            const token = getToken();
            const notes = document.getElementById(`notes-${id}`)?.value || '';
            
            try {
                const response = await fetch(`${API_URL}/superadmin/reject-request/${id}/`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ notes: notes })
                });
                const data = await response.json();
                alert(data.message);
                loadRequests();
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }
        
        async function loadDashboard() {
            const token = getToken();
            try {
                const response = await fetch(`${API_URL}/superadmin/groups/`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const groups = await response.json();
                
                document.getElementById('stats').innerHTML = `
                    <div class="row">
                        <div class="col-md-4"><div class="card text-center"><h2>${groups.length}</h2><p>Total Groups</p></div></div>
                        <div class="col-md-4"><div class="card text-center"><h2>${groups.reduce((s,g) => s + g.member_count, 0)}</h2><p>Total Members</p></div></div>
                        <div class="col-md-4"><div class="card text-center"><h2 id="pendingCount">0</h2><p>Pending Requests</p></div></div>
                    </div>
                `;
                
                document.getElementById('groupsList').innerHTML = groups.map(g => `
                    <div class="card">
                        <div class="d-flex justify-content-between">
                            <div><strong>${g.name}</strong><br><small>Code: ${g.code}</small></div>
                            <div><span class="badge bg-primary">${g.member_count} members</span></div>
                        </div>
                    </div>
                `).join('');
                
                // Get pending count
                const pendingRes = await fetch(`${API_URL}/superadmin/pending-requests/`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const pending = await pendingRes.json();
                document.getElementById('pendingCount').innerText = pending.length;
                
            } catch (error) {
                console.error(error);
            }
        }
        
        function showSection(section) {
            document.getElementById('dashboardSection').style.display = 'none';
            document.getElementById('requestsSection').style.display = 'none';
            document.getElementById('groupsSection').style.display = 'none';
            document.getElementById(`${section}Section`).style.display = 'block';
            
            document.querySelectorAll('.sidebar a').forEach(a => a.classList.remove('active'));
            event.target.classList.add('active');
            
            if (section === 'requests') loadRequests();
        }
        
        function logout() {
            localStorage.removeItem('access_token');
            localStorage.removeItem('user');
            window.location.href = 'login.html';
        }
        
        // Initialize
        checkAuth().then(() => {
            loadDashboard();
        });
    </script>
</body>
</html>
