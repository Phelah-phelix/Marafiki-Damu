<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Admin | Marafiki Damu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: #f5f5f0; }
        .top-nav { background: #1a1a2e; padding: 0 24px; height: 64px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
        .logo { display: flex; align-items: center; gap: 8px; font-weight: 600; font-size: 18px; color: white; }
        .logo i { color: #e74c3c; }
        .user-info { color: rgba(255,255,255,0.8); font-size: 14px; display: flex; align-items: center; gap: 12px; }
        .avatar { width: 36px; height: 36px; background: #667eea; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; }
        .sidebar { position: fixed; top: 64px; left: 0; width: 260px; height: calc(100vh - 64px); background: white; border-right: 1px solid #e0e0e0; padding: 24px 16px; }
        .nav-item { display: flex; align-items: center; gap: 12px; padding: 10px 16px; margin-bottom: 4px; border-radius: 8px; color: #555; text-decoration: none; font-size: 14px; font-weight: 500; cursor: pointer; }
        .nav-item:hover { background: #f0f0f0; }
        .nav-item.active { background: #1a1a2e; color: white; }
        .nav-item i { width: 20px; }
        .main-content { margin-left: 260px; padding: 32px; margin-top: 64px; }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 32px; }
        .stat-card { background: white; border-radius: 12px; padding: 20px; border: 1px solid #e0e0e0; }
        .stat-card .label { font-size: 13px; color: #888; margin-bottom: 8px; }
        .stat-card .value { font-size: 32px; font-weight: 700; color: #1a1a1a; }
        .card { background: white; border-radius: 12px; border: 1px solid #e0e0e0; overflow: hidden; margin-bottom: 24px; }
        .card-header { padding: 16px 20px; border-bottom: 1px solid #e0e0e0; font-weight: 600; display: flex; justify-content: space-between; align-items: center; }
        .card-body { padding: 20px; }
        .request-item { display: flex; justify-content: space-between; align-items: center; padding: 16px 0; border-bottom: 1px solid #e0e0e0; }
        .badge-pending { background: #f39c12; color: white; padding: 4px 12px; border-radius: 20px; font-size: 12px; }
        .btn-approve { background: #27ae60; color: white; border: none; padding: 6px 20px; border-radius: 6px; font-size: 13px; margin-right: 8px; cursor: pointer; }
        .btn-reject { background: #e74c3c; color: white; border: none; padding: 6px 20px; border-radius: 6px; font-size: 13px; cursor: pointer; }
        .alert-success { background: #d4edda; color: #155724; padding: 12px; border-radius: 8px; margin-bottom: 16px; }
        .alert-danger { background: #f8d7da; color: #721c24; padding: 12px; border-radius: 8px; margin-bottom: 16px; }
        @media (max-width: 768px) { .sidebar { display: none; } .main-content { margin-left: 0; } }
    </style>
</head>
<body>
    <div class="top-nav"><div class="logo"><i class="bi bi-heart-fill"></i> <span>Marafiki Damu</span></div><div class="user-info">Super Admin <div class="avatar">SA</div></div></div>
    <div class="sidebar">
        <a class="nav-item active" onclick="showSection('dashboard')"><i class="bi bi-speedometer2"></i> Dashboard</a>
        <a class="nav-item" onclick="showSection('groups')"><i class="bi bi-people"></i> All Groups</a>
        <a class="nav-item" onclick="showSection('groupRequests')"><i class="bi bi-plus-circle"></i> Group Creation Requests</a>
        <div style="margin-top: auto; padding-top: 40px;"><a class="nav-item" onclick="logout()"><i class="bi bi-box-arrow-right"></i> Logout</a></div>
    </div>
    <div class="main-content">
        <div id="alertContainer"></div>
        
        <div id="dashboardSection">
            <div style="margin-bottom: 24px;"><h1 style="font-size: 24px; font-weight: 600;">Super Admin Dashboard</h1><p style="color: #666;">Full system control</p></div>
            <div class="stats-grid" id="statsGrid"></div>
            <div class="card"><div class="card-header">Groups Overview</div><div class="card-body"><canvas id="groupsChart" height="300"></canvas></div></div>
        </div>
        
        <div id="groupsSection" style="display: none;">
            <div class="card"><div class="card-header">All Groups</div><div class="card-body" id="groupsList"></div></div>
        </div>
        
        <div id="groupRequestsSection" style="display: none;">
            <div class="card"><div class="card-header">Pending Group Creation Requests</div><div class="card-body" id="groupRequestsList"></div></div>
        </div>
    </div>
    <script>
        const API_URL = 'https://marafiki-backend.onrender.com/api';
        let groupsChart = null;
        
        function getToken() { return localStorage.getItem('access_token'); }
        
        function showAlert(message, type) {
            const container = document.getElementById('alertContainer');
            container.innerHTML = `<div class="alert-${type}" style="background: ${type === 'success' ? '#d4edda' : '#f8d7da'}; color: ${type === 'success' ? '#155724' : '#721c24'}; padding: 12px; border-radius: 8px; margin-bottom: 16px;">${message}</div>`;
            setTimeout(() => container.innerHTML = '', 5000);
        }
        
        async function loadDashboard() {
            const token = getToken();
            if (!token) { window.location.href = 'login.html'; return; }
            try {
                const res = await fetch(`${API_URL}/superadmin/groups/`, { headers: { 'Authorization': `Bearer ${token}` } });
                const groups = await res.json();
                const totalGroups = groups.length;
                const totalMembers = groups.reduce((s,g) => s + g.member_count, 0);
                document.getElementById('statsGrid').innerHTML = `<div class="stat-card"><div class="label">Total Groups</div><div class="value">${totalGroups}</div></div><div class="stat-card"><div class="label">Total Members</div><div class="value">${totalMembers}</div></div><div class="stat-card"><div class="label">Pending Group Requests</div><div class="value" id="pendingGroupCount">0</div></div>`;
                
                if (groupsChart) groupsChart.destroy();
                const ctx = document.getElementById('groupsChart').getContext('2d');
                groupsChart = new Chart(ctx, { type: 'bar', data: { labels: groups.map(g => g.name.length > 20 ? g.name.slice(0,20)+'...' : g.name), datasets: [{ label: 'Members', data: groups.map(g => g.member_count), backgroundColor: '#1a1a2e', borderRadius: 6 }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } } });
                document.getElementById('groupsList').innerHTML = groups.map(g => `<div class="request-item"><div><strong>${g.name}</strong><br><small>Code: ${g.code}</small><br><small>Members: ${g.member_count}</small></div><div><span class="badge-pending">${g.is_active ? 'Active' : 'Inactive'}</span></div></div>`).join('');
                await loadGroupRequests();
            } catch (error) { console.error(error); }
        }
        
        async function loadGroupRequests() {
            const token = getToken();
            try {
                const res = await fetch(`${API_URL}/superadmin/pending-group-requests/`, { headers: { 'Authorization': `Bearer ${token}` } });
                const requests = await res.json();
                document.getElementById('pendingGroupCount').innerText = requests.length;
                
                if (requests.length === 0) {
                    document.getElementById('groupRequestsList').innerHTML = '<div style="text-align: center; padding: 40px; color: #888;">No pending group creation requests</div>';
                } else {
                    document.getElementById('groupRequestsList').innerHTML = requests.map(r => `
                        <div class="request-item">
                            <div>
                                <strong style="font-size: 16px;">${r.group_name}</strong><br>
                                <small>Requested by: ${r.requester} (${r.requester_email})</small><br>
                                <small>Weekly Goal: KES ${r.weekly_goal} | Daily: KES ${r.daily_contribution}</small><br>
                                <small>${r.description || 'No description provided'}</small><br>
                                <small>Requested on: ${r.created_at}</small>
                            </div>
                            <div>
                                <button class="btn-approve" onclick="approveGroupRequest(${r.id})">Approve</button>
                                <button class="btn-reject" onclick="rejectGroupRequest(${r.id})">Reject</button>
                            </div>
                        </div>
                    `).join('');
                }
            } catch (error) {
                console.error('Error loading requests:', error);
                document.getElementById('groupRequestsList').innerHTML = '<div style="text-align: center; padding: 40px; color: #888;">Error loading requests</div>';
            }
        }
        
        async function approveGroupRequest(id) {
            const token = getToken();
            try {
                const res = await fetch(`${API_URL}/superadmin/approve-group-request/${id}/`, { 
                    method: 'POST', 
                    headers: { 'Authorization': `Bearer ${token}` } 
                });
                const data = await res.json();
                showAlert(data.message, 'success');
                loadDashboard();
            } catch (error) {
                showAlert('Error approving request', 'danger');
            }
        }
        
        async function rejectGroupRequest(id) {
            const token = getToken();
            try {
                const res = await fetch(`${API_URL}/superadmin/reject-group-request/${id}/`, { 
                    method: 'POST', 
                    headers: { 'Authorization': `Bearer ${token}` } 
                });
                const data = await res.json();
                showAlert(data.message, 'success');
                loadDashboard();
            } catch (error) {
                showAlert('Error rejecting request', 'danger');
            }
        }
        
        function showSection(section) {
            ['dashboard', 'groups', 'groupRequests'].forEach(s => document.getElementById(`${s}Section`).style.display = 'none');
            document.getElementById(`${section}Section`).style.display = 'block';
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            event.target.classList.add('active');
        }
        
        function logout() { localStorage.removeItem('access_token'); window.location.href = 'login.html'; }
        loadDashboard(); setInterval(loadDashboard, 30000);
    </script>
</body>
</html>
