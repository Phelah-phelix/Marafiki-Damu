<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Marafiki Damu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: #f0f2f5; }
        .sidebar { min-height: 100vh; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .stat-card { background: white; border-radius: 15px; padding: 20px; margin-bottom: 20px; }
        .status-pending { background: #ffc107; color: #000; padding: 5px 10px; border-radius: 20px; font-size: 12px; }
        .status-approved { background: #28a745; color: #fff; padding: 5px 10px; border-radius: 20px; font-size: 12px; }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-2 sidebar text-white p-3">
                <div class="text-center mb-4"><i class="bi bi-heart-fill text-danger" style="font-size: 2rem;"></i><h5 class="mt-2">Admin Panel</h5></div>
                <hr>
                <div class="nav flex-column">
                    <a href="#" class="nav-link text-white" onclick="loadDashboard()"><i class="bi bi-speedometer2"></i> Dashboard</a>
                    <a href="#" class="nav-link text-white" onclick="loadMembers()"><i class="bi bi-people"></i> Members</a>
                    <a href="#" class="nav-link text-white" onclick="showSettings()"><i class="bi bi-gear"></i> Settings</a>
                    <hr>
                    <a href="#" class="nav-link text-white" onclick="logout()"><i class="bi bi-box-arrow-right"></i> Logout</a>
                </div>
            </div>
            <div class="col-md-10 p-4">
                <div id="dashboardView">
                    <div class="row" id="statsCards"></div>
                    <div class="row mt-4"><div class="col-md-12"><div class="stat-card"><h5>Recent Members</h5><div id="recentMembers"></div></div></div></div>
                </div>
                <div id="membersView" style="display: none;">
                    <div class="stat-card"><h5>All Members</h5><div class="table-responsive"><table class="table" id="membersTable"><thead><tr><th>#</th><th>Username</th><th>Phone</th><th>Total</th><th>Status</th><th>Actions</th></tr></thead><tbody></tbody></table></div></div>
                </div>
                <div id="settingsView" style="display: none;">
                    <div class="stat-card"><h5>Chama Settings</h5>
                        <label>Weekly Goal (KES)</label><input type="number" id="weeklyGoal" class="form-control mb-2">
                        <label>Daily Contribution (KES)</label><input type="number" id="dailyContribution" class="form-control mb-2">
                        <label>Group Name</label><input type="text" id="groupName" class="form-control mb-2">
                        <button class="btn btn-primary mt-2" onclick="updateSettings()">Save Settings</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://marafiki-backend.onrender.com/api";
        
        function getToken() { return localStorage.getItem('access_token'); }
        
        async function loadDashboard() {
            document.getElementById('dashboardView').style.display = 'block';
            document.getElementById('membersView').style.display = 'none';
            document.getElementById('settingsView').style.display = 'none';
            
            const token = getToken();
            const response = await fetch(`${API_URL}/admin/dashboard/`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await response.json();
            
            document.getElementById('statsCards').innerHTML = `
                <div class="col-md-3"><div class="stat-card"><h6>Total Members</h6><h2>${data.statistics.total_members}</h2></div></div>
                <div class="col-md-3"><div class="stat-card"><h6>Approved</h6><h2 class="text-success">${data.statistics.approved_members}</h2></div></div>
                <div class="col-md-3"><div class="stat-card"><h6>Pending</h6><h2 class="text-warning">${data.statistics.pending_members}</h2></div></div>
                <div class="col-md-3"><div class="stat-card"><h6>Total Raised</h6><h2>KES ${data.statistics.total_raised}</h2></div></div>
            `;
            
            const pending = data.members.filter(m => m.status === 'pending');
            document.getElementById('recentMembers').innerHTML = pending.slice(0,5).map(m => `
                <div class="d-flex justify-content-between align-items-center border-bottom py-2">
                    <span><strong>${m.username}</strong> - ${m.phone_number}</span>
                    <button class="btn btn-sm btn-success" onclick="approveMember(${m.id})">Approve</button>
                </div>
            `).join('') || '<p>No pending members</p>';
        }
        
        async function loadMembers() {
            document.getElementById('dashboardView').style.display = 'none';
            document.getElementById('membersView').style.display = 'block';
            document.getElementById('settingsView').style.display = 'none';
            
            const token = getToken();
            const response = await fetch(`${API_URL}/admin/dashboard/`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await response.json();
            
            document.getElementById('membersTable').innerHTML = `
                <tbody>${data.members.map(m => `
                    <tr>
                        <td>${m.member_number || 'Pending'}</td>
                        <td>${m.username}</td>
                        <td>${m.phone_number}</td>
                        <td>KES ${m.total_contributed}</td>
                        <td><span class="status-${m.status}">${m.status}</span></td>
                        <td>
                            ${m.status === 'pending' ? `<button class="btn btn-sm btn-success" onclick="approveMember(${m.id})">Approve</button>
                            <button class="btn btn-sm btn-danger" onclick="rejectMember(${m.id})">Reject</button>` : ''}
                        </td>
                    </tr>
                `).join('')}</tbody>
            `;
        }
        
        function showSettings() {
            document.getElementById('dashboardView').style.display = 'none';
            document.getElementById('membersView').style.display = 'none';
            document.getElementById('settingsView').style.display = 'block';
        }
        
        async function approveMember(id) {
            const token = getToken();
            await fetch(`${API_URL}/admin/approve/${id}/`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}` }
            });
            alert('Member approved!');
            loadMembers();
        }
        
        async function rejectMember(id) {
            const token = getToken();
            await fetch(`${API_URL}/admin/reject/${id}/`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}` }
            });
            alert('Member rejected');
            loadMembers();
        }
        
        async function updateSettings() {
            const token = getToken();
            await fetch(`${API_URL}/admin/settings/`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({
                    weekly_goal: document.getElementById('weeklyGoal').value,
                    daily_contribution: document.getElementById('dailyContribution').value,
                    group_name: document.getElementById('groupName').value
                })
            });
            alert('Settings updated!');
        }
        
        function logout() { localStorage.removeItem('access_token'); window.location.href = 'login.html'; }
        
        loadDashboard();
    </script>
</body>
</html>
