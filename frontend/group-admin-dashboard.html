<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Marafiki Damu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: #f0f2f5; }
        .navbar { background: #2c3e50; color: white; padding: 15px 20px; }
        .sidebar { position: fixed; left: 0; top: 60px; width: 250px; background: white; height: 100%; padding: 20px; }
        .sidebar a { display: block; padding: 12px; color: #333; text-decoration: none; margin-bottom: 5px; border-radius: 8px; cursor: pointer; }
        .sidebar a:hover { background: #e0e0e0; }
        .sidebar a.active { background: #2c3e50; color: white; }
        .content { margin-left: 270px; padding: 20px; }
        .card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
        .form-control { margin-bottom: 15px; }
        .btn-submit { background: #2c3e50; color: white; border: none; padding: 10px 20px; border-radius: 8px; width: 100%; }
        .status-pending { color: orange; }
        .status-approved { color: green; }
        .status-rejected { color: red; }
    </style>
</head>
<body>
    <div class="navbar">
        <div><i class="bi bi-heart-fill text-danger"></i> Marafiki Damu - Admin Panel</div>
        <div><span id="adminName">Admin</span> | <a href="#" onclick="logout()" style="color: white;">Logout</a></div>
    </div>
    
    <div class="sidebar">
        <a href="#" class="active" onclick="showSection('dashboard')">📊 Dashboard</a>
        <a href="#" onclick="showSection('createGroup')">➕ Request Group</a>
        <a href="#" onclick="showSection('myRequests')">📋 My Requests</a>
        <hr>
        <a href="#" onclick="logout()">🚪 Logout</a>
    </div>
    
    <div class="content">
        <div id="dashboardSection">
            <h2>Admin Dashboard</h2>
            <div id="groupInfo" class="card">Loading...</div>
        </div>
        
        <div id="createGroupSection" style="display: none;">
            <div class="card">
                <h3>Request New Group</h3>
                <p class="text-muted">Submit a request to Super Admin to create a new group</p>
                <hr>
                <form id="requestForm">
                    <div class="mb-3">
                        <label class="form-label">Group Name *</label>
                        <input type="text" id="groupName" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Description</label>
                        <textarea id="description" class="form-control" rows="3"></textarea>
                    </div>
                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Weekly Goal (KES)</label>
                            <input type="number" id="weeklyGoal" class="form-control" value="100">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Daily Contribution (KES)</label>
                            <input type="number" id="dailyContribution" class="form-control" value="10">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Max Members</label>
                            <input type="number" id="maxMembers" class="form-control" value="50">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Notes for Super Admin</label>
                        <textarea id="adminNotes" class="form-control" rows="2"></textarea>
                    </div>
                    <button type="submit" class="btn-submit" id="submitBtn">Send Request to Super Admin</button>
                </form>
            </div>
        </div>
        
        <div id="myRequestsSection" style="display: none;">
            <h3>My Requests</h3>
            <div id="requestsList">Loading...</div>
        </div>
    </div>

    <script>
        const API_URL = 'https://marafiki-backend.onrender.com/api';
        
        function getToken() { return localStorage.getItem('access_token'); }
        
        async function loadDashboard() {
            const token = getToken();
            if (!token) { window.location.href = 'login.html'; return; }
            
            try {
                const response = await fetch(`${API_URL}/group-admin/dashboard/`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();
                
                if (data.group) {
                    document.getElementById('groupInfo').innerHTML = `
                        <h4>${data.group.name}</h4>
                        <p>Invite Code: <strong>${data.group.code}</strong></p>
                        <p>Weekly Goal: KES ${data.group.weekly_goal}</p>
                        <p>Active Members: ${data.statistics.approved_members}</p>
                    `;
                } else {
                    document.getElementById('groupInfo').innerHTML = `
                        <p>No group assigned yet.</p>
                        <button class="btn-submit" onclick="showSection('createGroup')">Request a Group</button>
                    `;
                }
            } catch (error) {
                console.error(error);
                document.getElementById('groupInfo').innerHTML = '<p>Error loading dashboard</p>';
            }
        }
        
        // Submit group request
        document.getElementById('requestForm')?.addEventListener('submit', async (e) => {
            e.preventDefault();
            const token = getToken();
            const submitBtn = document.getElementById('submitBtn');
            
            const requestData = {
                group_name: document.getElementById('groupName').value,
                description: document.getElementById('description').value,
                weekly_goal: parseInt(document.getElementById('weeklyGoal').value),
                daily_contribution: parseInt(document.getElementById('dailyContribution').value),
                max_members: parseInt(document.getElementById('maxMembers').value),
                admin_notes: document.getElementById('adminNotes').value
            };
            
            submitBtn.disabled = true;
            submitBtn.textContent = 'Sending...';
            
            try {
                const response = await fetch(`${API_URL}/admin/send-group-request/`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(requestData)
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    alert(data.message);
                    document.getElementById('requestForm').reset();
                    showSection('myRequests');
                    loadMyRequests();
                } else {
                    alert('Error: ' + (data.error || data.message));
                }
            } catch (error) {
                alert('Error: ' + error.message);
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Send Request to Super Admin';
            }
        });
        
        async function loadMyRequests() {
            const token = getToken();
            try {
                const response = await fetch(`${API_URL}/admin/my-requests/`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const requests = await response.json();
                
                if (requests.length === 0) {
                    document.getElementById('requestsList').innerHTML = '<div class="card">No requests submitted yet</div>';
                } else {
                    document.getElementById('requestsList').innerHTML = requests.map(r => `
                        <div class="card">
                            <strong>${r.group_name}</strong>
                            <span class="status-${r.status}">${r.status.toUpperCase()}</span>
                            <p>Goal: KES ${r.weekly_goal} | Daily: KES ${r.daily_contribution}</p>
                            <p><small>Requested: ${r.created_at}</small></p>
                            ${r.superadmin_notes ? `<p><strong>Response:</strong> ${r.superadmin_notes}</p>` : ''}
                        </div>
                    `).join('');
                }
            } catch (error) {
                console.error(error);
            }
        }
        
        function showSection(section) {
            document.getElementById('dashboardSection').style.display = 'none';
            document.getElementById('createGroupSection').style.display = 'none';
            document.getElementById('myRequestsSection').style.display = 'none';
            document.getElementById(`${section}Section`).style.display = 'block';
            
            if (section === 'myRequests') loadMyRequests();
        }
        
        function logout() {
            localStorage.removeItem('access_token');
            localStorage.removeItem('user');
            window.location.href = 'login.html';
        }
        
        // Check auth on load
        const token = getToken();
        if (!token) {
            window.location.href = 'login.html';
        } else {
            loadDashboard();
        }
    </script>
</body>
</html>
