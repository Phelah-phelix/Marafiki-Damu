<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Marafiki Damu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; }
        .card { border-radius: 30px; padding: 40px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card">
                    <div class="text-center mb-4">
                        <i class="bi bi-heart-fill text-danger" style="font-size: 3rem;"></i>
                        <h3>Reset Password</h3>
                    </div>
                    <div id="messageBox" class="alert" style="display: none;"></div>
                    <form id="resetForm">
                        <div class="mb-3"><label>Reset Token</label><input type="text" id="token" class="form-control" required></div>
                        <div class="mb-3"><label>New Password</label><input type="password" id="newPassword" class="form-control" required></div>
                        <div class="mb-3"><label>Confirm Password</label><input type="password" id="confirmPassword" class="form-control" required></div>
                        <button type="submit" class="btn btn-primary w-100">Reset Password</button>
                        <div class="text-center mt-3"><a href="login.html">Back to Login</a></div>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <script>
        const API_URL = 'http://192.168.1.100:8000/api';
        
        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const newPass = document.getElementById('newPassword').value;
            const confirmPass = document.getElementById('confirmPassword').value;
            
            if (newPass !== confirmPass) {
                alert('Passwords do not match');
                return;
            }
            
            const response = await fetch(`${API_URL}/reset-password/`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    token: document.getElementById('token').value,
                    new_password: newPass
                })
            });
            const data = await response.json();
            
            const msgBox = document.getElementById('messageBox');
            if (response.ok) {
                msgBox.className = 'alert alert-success';
                msgBox.textContent = 'Password reset successful! Redirecting to login...';
                msgBox.style.display = 'block';
                setTimeout(() => { window.location.href = 'login.html'; }, 2000);
            } else {
                msgBox.className = 'alert alert-danger';
                msgBox.textContent = data.error;
                msgBox.style.display = 'block';
            }
        });
    </script>
</body>
</html>
