<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Marafiki Damu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; }
        .card { border-radius: 30px; padding: 40px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card">
                    <div class="text-center mb-4">
                        <i class="bi bi-heart-fill text-danger" style="font-size: 3rem;"></i>
                        <h3>Forgot Password</h3>
                    </div>
                    <div id="messageBox" class="alert" style="display: none;"></div>
                    <form id="forgotForm">
                        <div class="mb-3"><label>Email Address</label><input type="email" id="email" class="form-control" required></div>
                        <button type="submit" class="btn btn-primary w-100">Send Reset Token</button>
                        <div class="text-center mt-3"><a href="login.html">Back to Login</a></div>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <script>
        const API_URL = "https://marafiki-backend.onrender.com/api";
        
        document.getElementById('forgotForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            
            const response = await fetch(`${API_URL}/forgot-password/`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email })
            });
            const data = await response.json();
            
            const msgBox = document.getElementById('messageBox');
            if (response.ok) {
                msgBox.className = 'alert alert-success';
                msgBox.textContent = 'Reset token sent to your email! Check console for token.';
                msgBox.style.display = 'block';
                setTimeout(() => { window.location.href = 'reset-password.html'; }, 3000);
            } else {
                msgBox.className = 'alert alert-danger';
                msgBox.textContent = data.error;
                msgBox.style.display = 'block';
            }
        });
    </script>
</body>
</html>
