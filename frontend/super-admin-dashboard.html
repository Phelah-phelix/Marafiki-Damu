
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Admin | Marafiki Damu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8ec 100%);
            min-height: 100vh;
        }
        .navbar-modern {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            padding: 0 32px;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .logo { display: flex; align-items: center; gap: 12px; }
        .logo-icon { width: 40px; height: 40px; background: linear-gradient(135deg, #667eea, #764ba2); border-radius: 12px; display: flex; align-items: center; justify-content: center; }
        .logo-icon i { color: white; font-size: 20px; }
        .logo-text { font-weight: 700; font-size: 20px; color: white; letter-spacing: -0.5px; }
        .logo-text span { color: #e74c3c; }
        .avatar { width: 40px; height: 40px; background: linear-gradient(135deg, #667eea, #764ba2); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: 600; }
        .sidebar {
            position: fixed;
            top: 70px;
            left: 0;
            width: 280px;
            height: calc(100vh - 70px);
            background: white;
            box-shadow: 2px 0 20px rgba(0,0,0,0.05);
            padding: 24px 16px;
        }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            margin-bottom: 8px;
            border-radius: 12px;
            color: #5a6e8a;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s;
            cursor: pointer;
        }
        .nav-item i { width: 24px; font-size: 18px; }
        .nav-item:hover { background: #f8f9fa; color: #4361ee; transform: translateX(5px); }
        .nav-item.active { background: linear-gradient(135deg, #4361ee, #3a0ca3); color: white; box-shadow: 0 4px 12px rgba(67,97,238,0.3); }
        .main-content { margin-left: 280px; padding: 32px; margin-top: 70px; }
        .welcome-header { margin-bottom: 32px; }
        .welcome-header h1 { font-size: 28px; font-weight: 700; color: #1a2c3e; margin-bottom: 8px; }
        .welcome-header p { color: #8a99b4; font-size: 14px; }
        .stat-card {
            background: white;
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            border: 1px solid rgba(0,0,0,0.05);
            transition: all 0.3s;
        }
        .stat-card:hover { transform: translateY(-4px); box-shadow: 0 12px 24px rgba(0,0,0,0.08); }
        .stat-icon { width: 48px; height: 48px; background: rgba(67,97,238,0.1); border-radius: 14px; display: flex; align-items: center; justify-content: center; margin-bottom: 16px; }
        .stat-icon i { font-size: 24px; color: #4361ee; }
        .stat-value { font-size: 32px; font-weight: 800; color: #1a2c3e; }
        .stat-label { font-size: 13px; color: #8a99b4; margin-top: 4px; }
        .group-card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #eef2f6;
            transition: all 0.3s;
        }
        .group-card:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,0,0,0.08); border-color: #4361ee; }
        @media (max-width: 1024px) {
            .sidebar { width: 80px; }
            .sidebar span { display: none; }
            .main-content { margin-left: 80px; }
            .nav-item { justify-content: center; }
            .nav-item i { margin-right: 0; }
        }
    </style>
</head>
<body>
    <div class="navbar-modern">
        <div class="logo"><div class="logo-icon"><i class="bi bi-shield-lock"></i></div><div class="logo-text">Marafiki <span>Damu</span></div></div>
        <div class="user-info"><span style="color: rgba(255,255,255,0.8);">Super Admin</span><div class="avatar">SA</div></div>
    </div>
    <div class="sidebar">
        <div class="nav-item active" onclick="showSection('dashboard')"><i class="bi bi-speedometer2"></i> <span>Dashboard</span></div>
        <div class="nav-item" onclick="showSection('groups')"><i class="bi bi-building"></i> <span>All Groups</span></div>
        <hr style="margin: 16px 0;">
        <div class="nav-item" onclick="logout()"><i class="bi bi-box-arrow-right"></i> <span>Logout</span></div>
    </div>
    <div class="main-content">
        <div id="dashboardSection">
            <div class="welcome-header"><h1>Super Admin Dashboard 👑</h1><p>Full system overview and control</p></div>
            <div class="row" id="statsRow"></div>
        </div>
        <div id="groupsSection" style="display: none;">
            <div class="welcome-header"><h1><i class="bi bi-building"></i> All Groups</h1><p>View all chama groups in the system</p></div>
            <div id="groupsList"></div>
        </div>
    </div>
    <script>
        const API_URL = 'https://marafiki-backend.onrender.com/api';
        function getToken() { return localStorage.getItem('access_token'); }
        async function loadDashboard() {
            const token = getToken();
            if (!token) { window.location.href = 'login.html'; return; }
            try {
                const response = await fetch(`${API_URL}/my-groups/`, { headers: { 'Authorization': `Bearer ${token}` } });
                const groups = await response.json();
                document.getElementById('statsRow').innerHTML = `
                    <div class="col-md-4 mb-3"><div class="stat-card"><div class="stat-icon"><i class="bi bi-building"></i></div><div class="stat-value">${groups.length}</div><div class="stat-label">Total Groups</div></div></div>
                    <div class="col-md-4 mb-3"><div class="stat-card"><div class="stat-icon"><i class="bi bi-people"></i></div><div class="stat-value">${groups.reduce((s,g) => s + (g.member_count || 0), 0)}</div><div class="stat-label">Total Members</div></div></div>
                    <div class="col-md-4 mb-3"><div class="stat-card"><div class="stat-icon"><i class="bi bi-coin"></i></div><div class="stat-value">KES 0</div><div class="stat-label">Total Raised</div></div></div>
                `;
                document.getElementById('groupsList').innerHTML = groups.map(g => `
                    <div class="group-card">
                        <div class="d-flex justify-content-between align-items-start mb-3">
                            <div><h4 class="mb-1">${g.name}</h4><p class="text-muted mb-0">Code: <strong>${g.code}</strong></p></div>
                            <div><span class="badge bg-primary">${g.member_count} Members</span></div>
                        </div>
                        <div class="row">
                            <div class="col-md-4"><small class="text-muted">Weekly Goal</small><br><strong>KES ${g.weekly_goal}</strong></div>
                            <div class="col-md-4"><small class="text-muted">Daily Contribution</small><br><strong>KES ${g.daily_contribution}</strong></div>
                            <div class="col-md-4"><small class="text-muted">Created By</small><br><strong>${g.created_by || 'Admin'}</strong></div>
                        </div>
                    </div>
                `).join('');
            } catch (error) { console.error(error); }
        }
        function showSection(section) {
            document.getElementById('dashboardSection').style.display = 'none';
            document.getElementById('groupsSection').style.display = 'none';
            document.getElementById(`${section}Section`).style.display = 'block';
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            event.target.closest('.nav-item').classList.add('active');
            if (section === 'groups') loadDashboard();
        }
        function logout() { localStorage.removeItem('access_token'); localStorage.removeItem('user'); window.location.href = 'login.html'; }
        if (!getToken()) { window.location.href = 'login.html'; } else { loadDashboard(); }
    </script>
</body>
</html>
