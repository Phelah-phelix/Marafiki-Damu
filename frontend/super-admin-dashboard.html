
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Admin Dashboard - Marafiki Damu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .sidebar {
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
            min-height: 100vh;
            padding: 20px;
            position: fixed;
            width: 260px;
        }
        .main-content {
            margin-left: 260px;
            padding: 30px;
        }
        .card-stats {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            transition: transform 0.3s;
        }
        .card-stats:hover { transform: translateY(-5px); }
        .nav-link {
            color: white !important;
            padding: 12px 20px;
            border-radius: 12px;
            margin: 5px 0;
        }
        .nav-link:hover { background: rgba(255,255,255,0.2); }
        .nav-link.active { background: rgba(255,255,255,0.3); }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="text-center mb-4">
            <i class="bi bi-heart-fill text-danger" style="font-size: 2rem;"></i>
            <h5 class="text-white mt-2">Super Admin</h5>
            <small class="text-white-50">Full Control</small>
        </div>
        <hr class="text-white-50">
        <nav class="nav flex-column">
            <a class="nav-link active" href="#" onclick="showSection('dashboard')">
                <i class="bi bi-speedometer2"></i> Dashboard
            </a>
            <a class="nav-link" href="#" onclick="showSection('groups')">
                <i class="bi bi-people"></i> All Groups
            </a>
            <a class="nav-link" href="#" onclick="showSection('requests')">
                <i class="bi bi-envelope"></i> Admin Requests
            </a>
            <a class="nav-link" href="#" onclick="showSection('create')">
                <i class="bi bi-plus-circle"></i> Create Group
            </a>
            <hr class="text-white-50">
            <a class="nav-link text-danger" href="#" onclick="logout()">
                <i class="bi bi-box-arrow-right"></i> Logout
            </a>
        </nav>
    </div>

    <div class="main-content">
        <div id="dashboardSection">
            <h1 class="text-white mb-4">Welcome, Super Admin! 👑</h1>
            <div class="row" id="statsRow"></div>
            <div class="card-stats">
                <h4>Recent Activity</h4>
                <div id="recentActivity">Loading...</div>
            </div>
        </div>

        <div id="groupsSection" style="display: none;">
            <h2 class="text-white mb-4">All Groups</h2>
            <div id="groupsList" class="row"></div>
        </div>

        <div id="requestsSection" style="display: none;">
            <h2 class="text-white mb-4">Admin Requests</h2>
            <div id="requestsList"></div>
        </div>

        <div id="createSection" style="display: none;">
            <div class="card-stats">
                <h3>Create New Group</h3>
                <form id="createGroupForm">
                    <div class="mb-3">
                        <label>Group Name</label>
                        <input type="text" id="groupName" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label>Description</label>
                        <textarea id="groupDesc" class="form-control" rows="3"></textarea>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label>Weekly Goal (KES)</label>
                            <input type="number" id="weeklyGoal" class="form-control" value="100">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label>Daily Contribution (KES)</label>
                            <input type="number" id="dailyContribution" class="form-control" value="10">
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary">Create Group</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://marafiki-backend.onrender.com/api";
        
        function getToken() { return localStorage.getItem('access_token'); }
        
        async function loadDashboard() {
            const token = getToken();
            if (!token) { window.location.href = 'login.html'; return; }
            
            try {
                const response = await fetch(`${API_URL}/superadmin/groups/`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const groups = await response.json();
                
                document.getElementById('statsRow').innerHTML = `
                    <div class="col-md-4">
                        <div class="card-stats text-center">
                            <h2>${groups.length}</h2>
                            <p>Total Groups</p>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="card-stats text-center">
                            <h2>${groups.reduce((s,g)=>s+g.member_count,0)}</h2>
                            <p>Total Members</p>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="card-stats text-center">
                            <h2 id="pendingCount">0</h2>
                            <p>Pending Requests</p>
                        </div>
                    </div>
                `;
                
                document.getElementById('groupsList').innerHTML = groups.map(g => `
                    <div class="col-md-6">
                        <div class="card-stats">
                            <h5>${g.name}</h5>
                            <p><code>Code: ${g.code}</code></p>
                            <p>Members: ${g.member_count} | Admin: ${g.admin_name}</p>
                            <span class="badge ${g.is_active ? 'bg-success' : 'bg-secondary'}">${g.is_active ? 'Active' : 'Inactive'}</span>
                        </div>
                    </div>
                `).join('');
                
                await loadRequests();
                
            } catch (error) {
                console.error('Error:', error);
            }
        }
        
        async function loadRequests() {
            const token = getToken();
            const response = await fetch(`${API_URL}/superadmin/pending-requests/`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const requests = await response.json();
            
            document.getElementById('pendingCount').innerText = requests.length;
            document.getElementById('requestsList').innerHTML = requests.map(r => `
                <div class="card-stats">
                    <div class="d-flex justify-content-between">
                        <div>
                            <h5>${r.requester}</h5>
                            <p>${r.requester_email}</p>
                            <p>Type: ${r.request_type}</p>
                            ${r.group_name ? `<p>Group: ${r.group_name}</p>` : ''}
                        </div>
                        <div>
                            <button class="btn btn-success m-1" onclick="approveRequest(${r.id})">Approve</button>
                            <button class="btn btn-danger m-1" onclick="rejectRequest(${r.id})">Reject</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }
        
        async function approveRequest(id) {
            const token = getToken();
            await fetch(`${API_URL}/superadmin/approve-request/${id}/`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}` }
            });
            alert('Request approved!');
            loadDashboard();
        }
        
        async function rejectRequest(id) {
            const token = getToken();
            await fetch(`${API_URL}/superadmin/reject-request/${id}/`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}` }
            });
            alert('Request rejected');
            loadDashboard();
        }
        
        document.getElementById('createGroupForm')?.addEventListener('submit', async (e) => {
            e.preventDefault();
            const token = getToken();
            
            const response = await fetch(`${API_URL}/superadmin/create-group/`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({
                    group_name: document.getElementById('groupName').value,
                    description: document.getElementById('groupDesc').value,
                    weekly_goal: document.getElementById('weeklyGoal').value,
                    daily_contribution: document.getElementById('dailyContribution').value
                })
            });
            
            const data = await response.json();
            alert(data.message + `\nGroup Code: ${data.group_code}`);
            document.getElementById('createGroupForm').reset();
            showSection('groups');
            loadDashboard();
        });
        
        function showSection(section) {
            const sections = ['dashboard', 'groups', 'requests', 'create'];
            sections.forEach(s => {
                document.getElementById(`${s}Section`).style.display = 'none';
            });
            document.getElementById(`${section}Section`).style.display = 'block';
        }
        
        function logout() {
            localStorage.removeItem('access_token');
            window.location.href = 'login.html';
        }
        
        loadDashboard();
    </script>
</body>
</html>
